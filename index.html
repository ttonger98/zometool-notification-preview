<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Zometool 消息通知中心 iPhone 17 Pro 适配预览</title>
  <style>
    :root {
      --w: 1180px;
      --h: 560px;
      --bg: #b9c7df;
      --panel: #72c7ff;
      --panel-dark: #567df5;
      --paper: #f6fbff;
      --ink: #25304a;
      --muted: #6f7890;
      --green: #7AF06A;
      --gold: #FFD65A;
      --blue: #45B9FF;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 50% 10%, #dfe8f8, #aebbd0 70%);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
    }
    .scene {
      width: var(--w);
      height: var(--h);
      position: relative;
      overflow: hidden;
      border-radius: 24px;
      background:
        radial-gradient(circle at 55% 80%, rgba(255,255,255,.32), transparent 24%),
        linear-gradient(180deg, #c8d3e7, #aab8d1);
      box-shadow: 0 30px 90px rgba(38, 54, 86, .28);
    }
    .scene::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: linear-gradient(90deg, rgba(255,255,255,.12) 1px, transparent 1px), linear-gradient(rgba(255,255,255,.08) 1px, transparent 1px);
      background-size: 90px 90px;
      opacity: .28;
    }
    .top-title {
      position: absolute;
      left: 86px;
      top: 22px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 26px;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 3px 0 rgba(33, 50, 72, .45), 0 0 12px rgba(255,255,255,.55);
    }
    .back { font-size: 32px; color: #FFE94E; filter: drop-shadow(0 2px 0 rgba(0,0,0,.36)); }
    .nav {
      position: absolute;
      left: 70px;
      top: 88px;
      width: 130px;
      color: #fff;
      font-size: 20px;
      font-weight: 900;
      text-shadow: 0 2px 4px rgba(30, 44, 78, .38);
    }
    .nav-item {
      height: 58px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding-left: 10px;
      margin-bottom: 16px;
      cursor: pointer;
      position: relative;
      opacity: .82;
    }
    .nav-item.active {
      opacity: 1;
      color: #1f5931;
      background: linear-gradient(180deg, #91ff70, #63e86b);
      border-radius: 8px;
      box-shadow: 0 5px 0 rgba(46, 145, 69, .42), inset 0 0 0 2px rgba(255,255,255,.42);
      text-shadow: none;
      justify-content: center;
      padding: 0;
    }
    .nav-item.active::before {
      content: "✦";
      position: absolute;
      top: -14px;
      left: 8px;
      color: #2c5831;
      font-size: 16px;
    }
    .tab-badge {
      min-width: 20px;
      height: 20px;
      padding: 0 6px;
      border-radius: 999px;
      display: none;
      align-items: center;
      justify-content: center;
      margin-left: auto;
      background: #FF5967;
      color: #fff;
      font-size: 12px;
      font-weight: 950;
      line-height: 1;
      box-shadow: 0 3px 8px rgba(255,89,103,.28), inset 0 0 0 1px rgba(255,255,255,.55);
      text-shadow: none;
    }
    .tab-badge.show { display: inline-flex; }
    .nav-item.active .tab-badge { margin-right: 8px; }
    .nav-line {
      position: absolute;
      left: 113px;
      top: 122px;
      height: 230px;
      border-left: 2px dotted rgba(255,255,255,.55);
    }
    .mail-shell {
      position: absolute;
      left: 250px;
      top: 62px;
      width: 842px;
      height: 430px;
      border-radius: 18px;
      background: linear-gradient(180deg, #6892ff, #546fe0);
      box-shadow: 0 16px 30px rgba(54, 78, 146, .36), inset 0 0 0 3px rgba(90, 117, 247, .8);
      padding: 18px 18px 18px 300px;
    }
    .mail-list-panel {
      position: absolute;
      left: 236px;
      top: 52px;
      width: 318px;
      height: 452px;
      border-radius: 20px;
      background: linear-gradient(180deg, #7ad3ff, #62aaf4);
      box-shadow: 0 14px 28px rgba(50, 79, 150, .35), inset 0 0 0 3px rgba(78, 151, 255, .65);
      padding: 48px 14px 70px;
      z-index: 3;
    }
    .mail-count {
      position: absolute;
      left: 24px;
      top: 13px;
      color: #fff;
      font-size: 20px;
      font-weight: 900;
      text-shadow: 0 2px 3px rgba(43, 79, 145, .55);
    }
    .mail-count b { color: #FFE640; }
    .starline {
      position: absolute;
      left: 120px;
      top: 36px;
      width: 150px;
      height: 4px;
      border-radius: 4px;
      background: #FEE83F;
    }
    .starline::after { content: "★"; color: #FEE83F; position: absolute; right: -16px; top: -10px; font-size: 18px; }
    .mail-list {
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      padding-right: 5px;
    }
    .mail-list::-webkit-scrollbar { width: 5px; }
    .mail-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.5); border-radius: 999px; }
    .mail-item {
      min-height: 78px;
      border-radius: 7px;
      background: rgba(224, 220, 255, .82);
      margin-bottom: 10px;
      display: grid;
      grid-template-columns: 52px 1fr;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      cursor: pointer;
      border: 2px solid transparent;
      box-shadow: inset 0 -8px 20px rgba(130, 135, 210, .10);
      overflow: hidden;
    }
    .mail-item.active {
      border-color: #FFE520;
      box-shadow: 0 0 0 2px rgba(255,229,32,.5), inset 0 -8px 20px rgba(130,135,210,.14);
    }
    .mail-icon {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #9EA4D7;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 23px;
      position: relative;
    }
    .mail-icon.gift::after { content: "🎁"; position: absolute; right: -8px; bottom: -7px; font-size: 20px; }
    .mail-text { min-width: 0; }
    .mail-text h3 {
      margin: 0;
      font-size: 17px;
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mail-text p { margin: 5px 0 0; color: #5E6580; font-size: 13px; font-weight: 800; }
    .panel-actions {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .game-btn {
      height: 44px;
      border: 0;
      border-radius: 7px;
      font-size: 20px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.26), 0 4px 0 rgba(54,79,150,.24);
    }
    .game-btn.disabled { background: linear-gradient(180deg, #D4D4D4, #A7A7A7); color: #535353; }
    .game-btn.green { background: linear-gradient(180deg, #8DF280, #44D966); color: #155826; }
    .game-btn.gold { background: linear-gradient(180deg, #FFE083, #C59A42); color: #654313; }
    .game-btn.blue { background: linear-gradient(180deg, #69C5FF, #3096E5); color: #0c4778; }
    .detail-paper {
      width: 100%;
      height: 100%;
      border-radius: 14px;
      background: linear-gradient(180deg, #FBFEFF, #EAF6FF);
      box-shadow: inset 0 0 0 2px rgba(161, 212, 255, .75);
      padding: 30px 28px 24px 34px;
      position: relative;
      overflow: hidden;
    }
    .detail-paper::after {
      content: "";
      position: absolute;
      right: 20px;
      bottom: 18px;
      width: 170px;
      height: 170px;
      border-radius: 50%;
      background: rgba(135, 197, 255, .12);
    }
    .detail-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      padding-bottom: 10px;
      border-bottom: 2px solid rgba(144, 170, 199, .36);
    }
    .detail-title { margin: 0; font-size: 27px; line-height: 1.22; font-weight: 900; }
    .detail-time { font-size: 16px; color: #8b92a2; font-weight: 800; white-space: nowrap; }
    .meta-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin: 10px 0 8px; color: #7f8798; font-size: 15px; font-weight: 800; }
    .mail-body { font-size: 19px; line-height: 1.55; font-weight: 850; color: #2d354b; margin-top: 8px; max-height: 104px; overflow: hidden; }
    .mail-body .hot { color: #ff9900; }
    .media-block {
      margin-top: 16px;
      display: grid;
      grid-template-columns: 156px 1fr;
      gap: 18px;
      align-items: center;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }
    .attach-title {
      margin: 0 0 10px;
      width: fit-content;
      min-width: 136px;
      height: 30px;
      background: #9EE2FF;
      color: #244b63;
      border-radius: 3px 18px 18px 3px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding-left: 12px;
      font-size: 17px;
      font-weight: 900;
    }
    .media-copy {
      color: #486073;
      font-size: 16px;
      line-height: 1.45;
      font-weight: 850;
    }
    .media-copy b { color: #244b63; }
    .attachments { display: flex; gap: 12px; margin-top: 0; flex-wrap: wrap; }
    .attach-card {
      width: 104px;
      height: 104px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      font-size: 44px;
      color: #fff;
      position: relative;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.25);
      cursor: pointer;
    }
    .media-block.batch { grid-template-columns: 1fr; max-width: 100%; overflow: hidden; margin-bottom: 76px; }
    .media-block.batch .attachments { flex-wrap: nowrap; overflow-x: auto; overflow-y: hidden; padding: 2px 4px 10px 2px; scroll-snap-type: x proximity; -webkit-overflow-scrolling: touch; }
    .media-block.batch .attachments::-webkit-scrollbar { height: 6px; }
    .media-block.batch .attachments::-webkit-scrollbar-thumb { background: rgba(67,169,244,.28); border-radius: 999px; }
    .media-block.batch .work-card { flex: 0 0 76px; scroll-snap-align: start; }
    .media-block.simple { grid-template-columns: 1fr; max-width: 140px; }
    .media-block.simple .work-card { width: 104px; }
    .media-block.batch .attach-card { width: 76px; height: 76px; font-size: 32px; }
    .attach-card::after { display: none !important; }
    .attach-card span { position: absolute; right: 5px; bottom: 2px; color: #fff; font-size: 18px; font-weight: 900; text-shadow: 0 2px 5px rgba(0,0,0,.55); }
    .detail-aside {
      display: grid;
      justify-items: end;
      gap: 10px;
      min-width: 112px;
    }
    .model-thumb {
      width: 86px;
      height: 68px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 36px;
      position: relative;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(65,123,160,.14), inset 0 0 0 2px rgba(255,255,255,.35);
    }
    .meta-model-thumb {
      flex: 0 0 auto;
      margin-top: -4px;
    }
    .model-thumb::before {
      content: attr(data-label);
      position: absolute;
      left: 7px;
      top: 7px;
      padding: 3px 7px;
      border-radius: 10px;
      background: rgba(255,255,255,.86);
      color: #338FD3;
      font-size: 10px;
      font-weight: 900;
    }
    .followup-gallery {
      margin-top: 20px;
      margin-bottom: 76px;
      position: relative;
      z-index: 1;
      max-width: 100%;
    }
    .gallery-title {
      margin-bottom: 10px;
      color: #338FD3;
      font-size: 15px;
      font-weight: 900;
    }
    .gallery-scroll {
      display: flex;
      gap: 14px;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 2px 4px 12px 2px;
      scroll-snap-type: x proximity;
      -webkit-overflow-scrolling: touch;
    }
    .gallery-scroll::-webkit-scrollbar { height: 6px; }
    .gallery-scroll::-webkit-scrollbar-thumb { background: rgba(67,169,244,.28); border-radius: 999px; }
    .work-card {
      flex: 0 0 128px;
      scroll-snap-align: start;
      display: grid;
      gap: 8px;
    }
    .work-img {
      width: 128px;
      height: 96px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 42px;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(65,123,160,.12), inset 0 0 0 2px rgba(255,255,255,.30);
    }
    .work-name {
      color: #5F6874;
      font-size: 12px;
      font-weight: 900;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .avatar-strip {
      margin-top: 14px;
      margin-bottom: 76px;
      position: relative;
      z-index: 1;
      max-width: 100%;
    }
    .avatar-card {
      flex: 0 0 66px;
      display: grid;
      justify-items: center;
      gap: 6px;
      scroll-snap-align: start;
      cursor: pointer;
    }
    .avatar-face {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 24px;
      font-weight: 900;
      box-shadow: 0 8px 18px rgba(65,123,160,.12), inset 0 0 0 2px rgba(255,255,255,.35);
    }
    .avatar-name {
      max-width: 66px;
      color: #5F6874;
      font-size: 11px;
      font-weight: 900;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .attach-card::after { display: none !important; }

    .detail-actions {
      position: absolute;
      right: 24px;
      bottom: 24px;
      display: flex;
      gap: 12px;
      z-index: 2;
    }
    .goto-mail {
      min-width: 124px;
      height: 44px;
      border: 0;
      border-radius: 14px;
      background: linear-gradient(180deg, #FFC64A, #FFA12E);
      color: #7B4B13;
      font-size: 20px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 12px 20px rgba(255,166,46,.20), inset 0 0 0 1px rgba(255,255,255,.58);
    }
    .delete-mail {
      min-width: 124px;
      height: 44px;
      border: 0;
      border-radius: 7px;
      background: linear-gradient(180deg, #70F080, #38D668);
      color: #145b25;
      font-size: 20px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.28), 0 4px 0 rgba(46,145,69,.34);
    }
    .modal-mask, .preview-mask {
      position: absolute;
      inset: 0;
      background: rgba(5, 12, 28, .66);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .modal-mask.show, .preview-mask.show { display: flex; }
    .confirm-modal {
      width: 420px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(88, 138, 214, .98), rgba(63, 99, 171, .98));
      border: 2px solid rgba(172,220,255,.65);
      padding: 28px;
      color: #fff;
      text-align: center;
      box-shadow: 0 24px 70px rgba(0,0,0,.36);
    }
    .confirm-modal h3 { margin: 0 0 12px; font-size: 22px; }
    .confirm-modal p { margin: 0 0 22px; font-size: 17px; }
    .confirm-actions { display: flex; justify-content: center; gap: 16px; }
    .preview-panel {
      display: grid;
      justify-items: center;
      gap: 14px;
      position: relative;
      z-index: 11;
    }
    .preview-box {
      width: 650px;
      height: 350px;
      border-radius: 22px;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 94px;
      box-shadow: inset 0 0 0 3px rgba(255,255,255,.25), 0 24px 80px rgba(0,0,0,.46);
      position: relative;
    }
    .preview-caption {
      color: #fff;
      font-size: 18px;
      font-weight: 900;
      text-shadow: 0 2px 8px rgba(0,0,0,.34);
    }
    .preview-user {
      min-height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      color: #fff;
      font-size: 15px;
      font-weight: 900;
      text-shadow: 0 2px 8px rgba(0,0,0,.34);
    }
    .preview-user:empty { display: none; }
    .preview-user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 15px;
      font-weight: 900;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.35), 0 6px 14px rgba(0,0,0,.18);
    }
    .preview-go {
      min-width: 132px;
      height: 42px;
      border: 0;
      border-radius: 15px;
      background: linear-gradient(180deg, #FFC64A, #FFA12E);
      color: #7B4B13;
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 12px 22px rgba(255,166,46,.22), inset 0 0 0 1px rgba(255,255,255,.60);
    }
    .preview-close { position: absolute; right: 40px; top: 30px; color: #fff; font-size: 42px; cursor: pointer; z-index: 11; }
    .toast { position: absolute; left: 50%; bottom: 20px; transform: translateX(-50%) translateY(20px); background: rgba(34, 55, 92, .92); color: #fff; border-radius: 999px; padding: 10px 18px; opacity: 0; transition: .2s; z-index: 12; font-weight: 900; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .device-note {
      position: fixed;
      left: 50%;
      top: 24px;
      transform: translateX(-50%);
      color: rgba(75,88,116,.78);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: .04em;
    }
    .phone-frame {
      width: 1180px;
      height: 560px;
      border-radius: 42px;
      padding: 0;
      background: transparent;
      box-shadow: 0 30px 80px rgba(23,32,51,.24);
      position: relative;
      overflow: hidden;
    }
    .phone-frame::before,
    .phone-frame::after { display: none; }
    .phone-screen {
      width: 100%;
      height: 100%;
      border-radius: 42px;
      overflow: hidden;
      position: relative;
      background: #EEF2F8;
      box-shadow: none;
    }
    .dynamic-island { display: none; }
    .screen-content {
      position: absolute;
      left: 0;
      top: 0;
      width: 1180px;
      height: 560px;
      transform: none;
      transform-origin: left top;
    }
    .screen-content .scene {
      box-shadow: none;
      border-radius: 42px;
    }

    /* Zometool APP style refresh */
    :root {
      --w: 1180px;
      --h: 560px;
      --app-bg: #FFF8EC;
      --app-bg-2: #FFF1D8;
      --app-card: rgba(255,255,255,.86);
      --app-card-strong: #FFFFFF;
      --app-ink: #454A57;
      --app-muted: #8D929C;
      --app-blue: #5DB8F3;
      --app-cyan: #79E0DD;
      --app-green: #8EDC86;
      --app-yellow: #FFC64A;
      --app-orange: #FF9D2E;
      --app-red: #F06A7A;
      --app-line: rgba(69,74,87,.10);
    }
    body {
      background:
        radial-gradient(circle at 8% 8%, rgba(255,210,102,.36), transparent 20%),
        radial-gradient(circle at 82% 82%, rgba(255,231,164,.52), transparent 22%),
        linear-gradient(135deg, #FFF5DE, #F7FBFF 58%, #FFF7EA);
    }
    .scene {
      background:
        radial-gradient(circle at 11% 86%, rgba(255,213,91,.28), transparent 8%),
        radial-gradient(circle at 48% 24%, rgba(255,217,94,.22), transparent 7%),
        radial-gradient(circle at 86% 28%, rgba(125,224,221,.20), transparent 12%),
        linear-gradient(135deg, #FFF7E9 0%, #FFFDF8 48%, #F3FBFF 100%);
      color: var(--app-ink);
    }
    .scene::before {
      background-image: none;
      opacity: 1;
    }
    .scene::after {
      content: "";
      position: absolute;
      left: 26px;
      bottom: 22px;
      width: 106px;
      height: 108px;
      border-radius: 28px;
      background:
        linear-gradient(90deg, rgba(255,216,119,.38) 16px, transparent 16px) 0 0 / 34px 100% no-repeat,
        linear-gradient(90deg, rgba(255,226,151,.32) 20px, transparent 20px) 52px 20px / 54px 88px no-repeat;
      opacity: .5;
      pointer-events: none;
    }
    .top-title {
      left: 66px;
      top: 30px;
      color: var(--app-ink);
      font-size: 27px;
      text-shadow: none;
      letter-spacing: -.02em;
    }
    .back {
      color: var(--app-yellow);
      filter: drop-shadow(0 2px 4px rgba(255,198,74,.36));
    }
    .nav {
      left: 70px;
      top: 112px;
      color: #7F8490;
      text-shadow: none;
      font-size: 20px;
    }
    .nav-line { border-left-color: rgba(148,153,165,.26); }
    .nav-item {
      color: #8E929B;
      opacity: 1;
      padding-left: 8px;
      text-shadow: none;
    }
    .nav-item.active {
      color: #3F6B45;
      background: linear-gradient(180deg, #CBF7A3, #78E57A);
      border-radius: 12px;

];
let currentTab = 'all';
let currentId = 1;
const sessionOrder = {};
const mailList = document.getElementById('mailList');
const detailPaper = document.getElementById('detailPaper');
const toast = document.getElementById('toast');
const readAllButton = document.getElementById('readAll');
const confirmMask = document.getElementById('confirmMask');
const singleDeleteMask = document.getElementById('singleDeleteMask');
const previewMask = document.getElementById('previewMask');
const previewBox = document.getElementById('previewBox');
const previewCaption = document.getElementById('previewCaption');
const previewUser = document.getElementById('previewUser');
let previewTargetLabel = '';
function tabMessages(tab){ return tab === 'all' ? messages : messages.filter(m => m.tab === tab); }
function buildFreshOrder(tab){
  return tabMessages(tab)
    .sort((a,b)=>{
      if(a.unread !== b.unread) return a.unread ? -1 : 1;
      return (b.sort||0)-(a.sort||0);
    })
    .map(m=>m.id);
}
function refreshTabOrder(tab){ sessionOrder[tab] = buildFreshOrder(tab); }
function filtered(){
  if(!sessionOrder[currentTab]) refreshTabOrder(currentTab);
  const ids = sessionOrder[currentTab];
  const data = tabMessages(currentTab);
  return [...data].sort((a,b)=>{
    const indexA = ids.indexOf(a.id);
    const indexB = ids.indexOf(b.id);
    const safeA = indexA === -1 ? Number.MAX_SAFE_INTEGER : indexA;
    const safeB = indexB === -1 ? Number.MAX_SAFE_INTEGER : indexB;
    if(safeA !== safeB) return safeA - safeB;
    return (b.sort||0)-(a.sort||0);
  });
}
function ensureCurrent(){ const data = filtered(); if(!data.find(m => m.id === currentId)) currentId = (data.find(m=>m.unread) || data[0] || {}).id; }
function escapeAttr(value){ return String(value).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function unreadCountFor(tab){ return tabMessages(tab).filter(m=>m.unread).length; }
function updateTabBadges(){
  document.querySelectorAll('.tab-badge').forEach(badge=>{
    const count = unreadCountFor(badge.dataset.badge);
    badge.textContent = count > 99 ? '99+' : count;
    badge.classList.toggle('show', count > 0);
  });
}
function render(){
  ensureCurrent();
  const data = filtered();
  const unreadCount = data.filter(m=>m.unread).length;
  updateTabBadges();
  readAllButton.classList.toggle('disabled', unreadCount === 0);
  readAllButton.classList.toggle('read-active', unreadCount > 0);
  mailList.innerHTML = data.map(m => { const listTitle = m.title; return `<div class="mail-item ${m.id===currentId?'active':''} ${m.unread?'unread':'read'}" onclick="selectMail(${m.id})"><div class="mail-icon ${m.gift?'gift':''}">${m.icon}</div><div class="mail-text"><h3 title="${escapeAttr(listTitle)}">${listTitle}</h3><p>${m.time}</p></div></div>`; }).join('') || '<div style="color:#fff;font-weight:900;text-align:center;margin-top:80px;">暂无消息</div>';
  renderDetail();
}
function renderDetail(){
  const m = messages.find(x => x.id === currentId);
  if(!m){ detailPaper.innerHTML = '<div style="display:grid;place-items:center;height:100%;font-size:22px;color:#7f8798;font-weight:900;">暂无消息</div>'; return; }
  const safeTitle = m.title.replace(/'/g,"\'");
  const mediaName = getMediaName(m);
  const img = m.image && !m.followupWorks && !m.users ? `<div class="media-block simple"><div class="work-card single"><div class="attach-card" style="background:${m.image[1]}" onclick="openPreview('${m.image[0]}','${mediaName.replace(/'/g,"\\'")}','${m.image[1]}')">${m.image[0]}</div><div class="work-name">${mediaName}</div></div></div>` : '';
  const followupGallery = m.followupWorks ? `<div class="followup-gallery"><div class="gallery-scroll">${m.followupWorks.map(work=>{ const caption = work.title || `【${work.user}】的作品`; const avatar = work.avatar || work.user.slice(0,1); const userColor = work.userColor || '#4B6BFF'; return `<div class="work-card"><div class="work-img" style="background:${work.bg}" onclick="openPreview('${work.icon}','${caption.replace(/'/g,"\'")}','${work.bg}','${work.user}','${avatar}','${userColor}','跟拼作品详情页')">${work.icon}</div><div class="work-name">${caption}</div></div>`; }).join('')}</div></div>` : '';
  const attach = m.attach ? `<div class="media-block batch"><div class="attachments">${m.attach.map(a=>`<div class="work-card"><div class="attach-card" style="background:${a[2]}" onclick="openPreview('${a[0]}','${a[1].replace(/'/g,"\'")}','${a[2]}','','','','造型详情页')">${a[0]}</div><div class="work-name">${a[1]}</div></div>`).join('')}</div></div>` : '';
  const userStrip = m.users ? `<div class="avatar-strip"><div class="gallery-scroll">${m.users.map(u=>`<div class="avatar-card" onclick="showToast('进入${u[0]}的主页')"><div class="avatar-face" style="background:${u[2]}">${u[1]}</div><div class="avatar-name">${u[0]}</div></div>`).join('')}</div></div>` : '';
  const banner = m.banner ? `<div class="activity-banner" style="background:${m.banner.bg}" onclick="goViewCurrent()"><div class="banner-copy"><div class="banner-label">${m.banner.label}</div><b>${m.banner.title}</b><span>${m.banner.subtitle}</span></div><div class="banner-icon">${m.banner.icon}</div></div>` : '';
  const showImageInMeta = m.image && (m.followupWorks || m.users || /跟拼作品被|夸了夸|评论/.test(m.title));
  const metaLabel = m.followupWorks ? '原造型' : (m.imageLabel === '造型图' ? '造型' : '作品');
  const metaModel = showImageInMeta ? `<div class="model-thumb meta-model-thumb" data-label="${metaLabel}" style="background:${m.image[1]}" onclick="openPreview('${m.image[0]}','${mediaName.replace(/'/g,"\\'")}','${m.image[1]}')">${m.image[0]}</div>` : '';
  const canGo = !m.noAction && (m.tab === 'system' || /跟拼|评论|夸一夸|夸了夸|粉丝|收藏|点赞|赞了|分享/.test(m.title));
  const actionText = m.title.includes('暂未通过审核') ? '去修改' : '去看看';
  const action = canGo ? `<button class="goto-mail" onclick="goViewCurrent()">${actionText}</button>` : '';
  const body = formatMessageBody(m.text);
  detailPaper.innerHTML = `<div class="detail-head"><h2 class="detail-title">${m.title}</h2><div class="detail-time">${m.time}</div></div><div class="meta-row"><span>来自：${m.from}</span>${metaModel}</div><div class="mail-body">${body}</div>${followupGallery || banner || img || attach}${userStrip}<div class="detail-actions">${action}<button class="delete-mail" onclick="openSingleDeleteConfirm()">删除消息</button></div>`;
}

function getMediaName(message){
  if(message.modelName) return message.modelName;
  const bracketMatch = message.text && message.text.match(/【([^】]+)】/);
  if(bracketMatch) return bracketMatch[1];
  if(message.imageLabel === '造型图') return '造型名字';
  if(message.imageLabel === '作品图') return '作品标题';
  return '图片标题';
}

function formatMessageBody(text){
  return text.replace(/不通过原因|夸一夸|夸了夸|共创达人评论/g, '<span class="hot">$&</span>');
}
function selectMail(id){ currentId = id; const m = messages.find(x=>x.id===id); if(m) m.unread=false; render(); }
function deleteCurrent(){ const idx = messages.findIndex(m=>m.id===currentId); if(idx>=0) messages.splice(idx,1); Object.keys(sessionOrder).forEach(tab=>{ sessionOrder[tab] = sessionOrder[tab].filter(id=>id!==currentId); }); currentId = (filtered()[0]||messages[0]||{}).id; render(); showToast('消息已删除'); }
function openSingleDeleteConfirm(){ singleDeleteMask.classList.add('show'); }
function closeSingleDeleteConfirm(){ singleDeleteMask.classList.remove('show'); }
function confirmSingleDelete(){ closeSingleDeleteConfirm(); deleteCurrent(); }
function showToast(t){ toast.textContent=t; toast.classList.add('show'); setTimeout(()=>toast.classList.remove('show'),1200); }
function getMessageTargetLabel(message){
  if(!message) return '查看页';
  const title = message.title || '';
  const from = message.from || '';
  if(title.includes('暂未通过审核')) return '作品修改页';
  if(title.includes('活动招募')) return '活动主页';
  if(title.includes('作品集')) return '作品集列表页';
  if(title.includes('营销信息')) return '营销落地页';
  if(title.includes('造型库上新') || title.includes('功能模块更新')) return '造型库主页';
  if(title.includes('课程')) return '课程中心页';
  if(title.includes('入选官方造型库')) return '造型详情页';
  if(title.includes('跟拼作品')) return '跟拼作品详情页';
  if(title.includes('跟拼了你的造型')) return '该造型的跟拼作品列表页';
  if(title.includes('收藏了你的造型') || title.includes('分享了你的造型')) return '造型详情页';
  if(from === '作品圈' || title.includes('作品')) return '作品详情页';
  if(title.includes('V 标')) return '个人主页';
  return '查看页';
}
function goViewCurrent(){ const m = messages.find(x=>x.id===currentId); showToast(`进入${getMessageTargetLabel(m)}`); }
function openPreview(icon,title,bg,userName='',userAvatar='',userColor='#4B6BFF',targetLabel=''){ previewBox.textContent=icon; previewCaption.textContent=title; previewBox.style.background=bg; previewUser.innerHTML = userName ? `<div class="preview-user-avatar" style="background:${userColor}">${userAvatar || userName.slice(0,1)}</div><span>${userName}</span>` : ''; previewTargetLabel = targetLabel; previewMask.classList.add('show'); }
function closePreview(){ previewMask.classList.remove('show'); previewTargetLabel = ''; }
function goPreviewTarget(){ const m = messages.find(x=>x.id===currentId); const label = previewTargetLabel || getMessageTargetLabel(m); closePreview(); showToast(`进入${label}`); }
function closeDeleteConfirm(){ confirmMask.classList.remove('show'); }
function confirmDeleteRead(){ const readIds = messages.filter(m=>!m.unread).map(m=>m.id); for(let i=messages.length-1;i>=0;i--){ if(!messages[i].unread) messages.splice(i,1); } Object.keys(sessionOrder).forEach(tab=>{ sessionOrder[tab] = sessionOrder[tab].filter(id=>!readIds.includes(id)); }); closeDeleteConfirm(); currentId=(filtered().find(m=>m.unread)||filtered()[0]||messages[0]||{}).id; render(); showToast('已删除已读消息'); }
document.getElementById('readAll').onclick = () => { const data = tabMessages(currentTab); if(!data.some(m=>m.unread)){ showToast('当前没有未读消息'); return; } data.forEach(m=>m.unread=false); render(); showToast('已全部标记已读'); };
document.getElementById('deleteRead').onclick = () => confirmMask.classList.add('show');
document.querySelectorAll('.nav-item').forEach(n => n.onclick = () => { currentTab=n.dataset.tab; refreshTabOrder(currentTab); document.querySelectorAll('.nav-item').forEach(x=>x.classList.toggle('active',x===n)); currentId=(filtered().find(m=>m.unread)||filtered()[0]||{}).id; render(); });
confirmMask.onclick = e => { if(e.target===confirmMask) closeDeleteConfirm(); };
singleDeleteMask.onclick = e => { if(e.target===singleDeleteMask) closeSingleDeleteConfirm(); };
previewMask.onclick = e => { if(e.target===previewMask) closePreview(); };

function setAppViewport(){
  const visualViewport = window.visualViewport;
  const width = visualViewport ? visualViewport.width : window.innerWidth;
  const height = visualViewport ? visualViewport.height : window.innerHeight;
  document.documentElement.style.setProperty('--app-height', `${height}px`);
  document.documentElement.style.setProperty('--app-width', `${width}px`);
}
function scheduleViewportRefresh(){ [0, 120, 300, 650].forEach(delay => setTimeout(setAppViewport, delay)); }
setAppViewport();
window.addEventListener('resize', scheduleViewportRefresh);
window.addEventListener('orientationchange', scheduleViewportRefresh);
if(window.visualViewport) window.visualViewport.addEventListener('resize', scheduleViewportRefresh);
render();
</script>
