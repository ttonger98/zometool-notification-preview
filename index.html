  const data = filtered();
  countText.textContent = messages.length;
  mailList.innerHTML = data.map(m => `<div class="mail-item ${m.id===currentId?'active':''}" onclick="selectMail(${m.id})"><div class="mail-icon ${m.gift?'gift':''}">${m.icon}</div><div class="mail-text"><h3>${m.title}</h3><p>${m.time}</p></div></div>`).join('') || '<div style="color:#fff;font-weight:900;text-align:center;margin-top:80px;">暂无消息</div>';
  renderDetail();
}
function renderDetail(){
  const m = messages.find(x => x.id === currentId);
  if(!m){ detailPaper.innerHTML = '<div style="display:grid;place-items:center;height:100%;font-size:22px;color:#7f8798;font-weight:900;">暂无消息</div>'; return; }
  const img = m.image ? `<div class="media-block"><div><div class="attach-title">🔗 ${m.imageLabel || '展示图'}</div><div class="attachments"><div class="attach-card" style="background:${m.image[1]}" onclick="openPreview('${m.image[0]}','${m.title.replace(/'/g,"\\'")}','${m.image[1]}')">${m.image[0]}</div></div></div><div class="media-copy"><b>点击图片可放大预览</b><br>用于补充识别具体作品或造型。</div></div>` : '';
  const attach = m.attach ? `<div class="media-block batch"><div class="attach-title">🔗 代表造型</div><div class="attachments">${m.attach.map(a=>`<div class="attach-card" style="background:${a[2]}">${a[0]}<span>${a[1]}</span></div>`).join('')}</div><div class="media-copy"><b>仅展示部分代表造型</b>，完整上新列表点击去看看查看。</div></div>` : '';
  const canGo = m.tab === 'system' || /跟拼|评论|夸一夸|粉丝|收藏|点赞|分享/.test(m.title);
  const actionText = m.title.includes('暂未通过审核') ? '去修改' : '去看看';
  const action = canGo ? `<button class="goto-mail" onclick="goViewCurrent()">${actionText}</button>` : '';
  detailPaper.innerHTML = `<div class="detail-head"><h2 class="detail-title">${m.title}</h2><div class="detail-time">${m.time}</div></div><div class="meta-row"><span>来自：${m.from}</span><span>保留：${m.valid}</span></div><div class="mail-body">${m.text.replace(/不通过原因|夸一夸内容|共创达人评论/g, '<span class="hot">$&</span>')}</div>${img || attach}<div class="detail-actions">${action}<button class="delete-mail" onclick="openSingleDeleteConfirm()">删除消息</button></div>`;
}
function selectMail(id){ currentId = id; const m = messages.find(x=>x.id===id); if(m) m.unread=false; render(); }
function deleteCurrent(){ const idx = messages.findIndex(m=>m.id===currentId); if(idx>=0) messages.splice(idx,1); currentId = (filtered()[0]||messages[0]||{}).id; render(); showToast('消息已删除'); }
function openSingleDeleteConfirm(){ singleDeleteMask.classList.add('show'); }
function closeSingleDeleteConfirm(){ singleDeleteMask.classList.remove('show'); }
function confirmSingleDelete(){ closeSingleDeleteConfirm(); deleteCurrent(); }
function showToast(t){ toast.textContent=t; toast.classList.add('show'); setTimeout(()=>toast.classList.remove('show'),1200); }
function goViewCurrent(){ const m = messages.find(x=>x.id===currentId); showToast(m && m.title.includes('暂未通过审核') ? '进入修改页' : '进入查看页'); }
function openPreview(icon,title,bg){ previewBox.textContent=icon; previewBox.dataset.title=title; previewBox.style.background=bg; previewMask.classList.add('show'); }
function closePreview(){ previewMask.classList.remove('show'); }
function closeDeleteConfirm(){ confirmMask.classList.remove('show'); }
function confirmDeleteRead(){ for(let i=messages.length-1;i>=0;i--){ if(!messages[i].unread) messages.splice(i,1); } closeDeleteConfirm(); currentId=(filtered().find(m=>m.unread)||filtered()[0]||messages[0]||{}).id; render(); showToast('已删除已读消息'); }
document.getElementById('readAll').onclick = () => { messages.forEach(m=>m.unread=false); render(); showToast('已全部标记已读'); };
document.getElementById('deleteRead').onclick = () => confirmMask.classList.add('show');
document.querySelectorAll('.nav-item').forEach(n => n.onclick = () => { currentTab=n.dataset.tab; document.querySelectorAll('.nav-item').forEach(x=>x.classList.toggle('active',x===n)); currentId=(filtered().find(m=>m.unread)||filtered()[0]||{}).id; render(); });
confirmMask.onclick = e => { if(e.target===confirmMask) closeDeleteConfirm(); };
singleDeleteMask.onclick = e => { if(e.target===singleDeleteMask) closeSingleDeleteConfirm(); };
previewMask.onclick = e => { if(e.target===previewMask) closePreview(); };
render();

	const DESIGN_W = 1180, DESIGN_H = 560;
	const phoneScreen = document.querySelector(".phone-screen");
	function resize() {
	  const vw = document.documentElement.clientWidth || window.innerWidth;
	  const vh = document.documentElement.clientHeight || window.innerHeight;
	  const scale = Math.min(vw / DESIGN_W, vh / DESIGN_H);
	  phoneScreen.style.transform = "scale(" + scale + ")";
	}
	window.addEventListener("resize", resize);
	window.addEventListener("orientationchange", function () { setTimeout(resize, 100); });
	setTimeout(resize, 300);
	resize();
</script>
</body>
</html>
